 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e1015;
    --panel: #161a22;
    --panel-2: #1d222c;
    --grid-a: #131720;
    --grid-b: #11151d;
    --snake: #4ade80;
    --snake-head: #86efac;
    --food: #f472b6;
    --text: #e6e9ef;
    --muted: #8b93a3;
    --accent: #4ade80;
    --radius: 16px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
  }

  body {
    background:
      radial-gradient(1200px 800px at 80% -10%, #1a2030 0%, transparent 55%),
      radial-gradient(1000px 700px at -10% 110%, #19222b 0%, transparent 50%),
      var(--bg);
    color: var(--text);
    font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 100vh;
  }

  .app {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  h1 .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 16px var(--accent);
  }

  .scores {
    display: flex;
    gap: 10px;
  }

  .score-card {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 8px 14px;
    text-align: right;
    min-width: 84px;
  }

  .score-card .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .score-card .value {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }

  .board-wrap {
    position: relative;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6);
  }

  canvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 10px;
    background: var(--grid-b);
    touch-action: none;
  }

  .overlay {
    position: absolute;
    inset: 14px;
    border-radius: 10px;
    background: rgba(12,14,19,0.82);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 24px;
    transition: opacity 0.25s ease;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay h2 {
    margin: 0;
    font-size: 26px;
  }

  .overlay p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
    max-width: 280px;
  }

  .btn {
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    color: #0c1410;
    background: var(--accent);
    padding: 12px 26px;
    border-radius: 999px;
    transition: transform 0.12s ease, box-shadow 0.2s ease, filter 0.2s ease;
    box-shadow: 0 8px 24px -8px var(--accent);
  }
  .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
  .btn:active { transform: translateY(0); }
  .btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-top: -4px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12.5px;
    color: var(--text);
  }
  .chip i {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    box-shadow: 0 0 8px currentColor;
  }
  .chip b { color: var(--muted); font-weight: 600; }
  .chip.muted-chip { color: var(--muted); border-style: dashed; }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: var(--muted);
    font-size: 13px;
  }

  .keys {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  kbd {
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,0.08);
    border-bottom-width: 2px;
    border-radius: 6px;
    padding: 2px 8px;
    font-family: inherit;
    font-size: 12px;
    color: var(--text);
  }

  .speed {
    display: flex;
    gap: 6px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 999px;
    padding: 4px;
  }

  .speed button {
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .speed button.active {
    background: var(--accent);
    color: #0c1410;
  }

  @media (max-width: 420px) {
    h1 { font-size: 22px; }
    .controls { flex-direction: column; align-items: stretch; gap: 10px; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1><span class="dot"></span>Snake</h1>
      <div class="scores">
        <div class="score-card">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="score-card">
          <div class="label">Best</div>
          <div class="value" id="best">0</div>
        </div>
      </div>
    </header>

    <div class="board-wrap">
      <canvas id="game" width="420" height="420"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="ov-title">Ready to play?</h2>
        <p id="ov-text">Use the arrow keys or WASD to steer. Eat the pink food, grow longer, and don't hit yourself.</p>
        <button class="btn" id="start-btn">Start Game</button>
      </div>
    </div>

    <div class="legend">
      <span class="chip"><i style="background:#f472b6"></i>Apple <b>+1</b></span>
      <span class="chip"><i style="background:#fbbf24"></i>Star <b>+3</b></span>
      <span class="chip"><i style="background:#60a5fa"></i>Diamond <b>+5</b></span>
      <span class="chip muted-chip">bonuses are timed — grab them fast</span>
    </div>

    <div class="controls">
      <div class="keys">
        <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd>
        <span style="margin:0 4px">or</span>
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
        <span style="margin:0 4px">·</span>
        <kbd>Space</kbd> pause
      </div>
      <div class="speed" id="speed">
        <button data-speed="160">Chill</button>
        <button data-speed="110" class="active">Normal</button>
        <button data-speed="70">Fast</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ov-title');
  const ovText = document.getElementById('ov-text');
  const startBtn = document.getElementById('start-btn');
  const speedBox = document.getElementById('speed');

  const GRID = 21;                 // cells per side
  const CELL = canvas.width / GRID;

  // Food types. Regular spawns always; bonuses appear occasionally and expire.
  const FOODS = {
    apple:   { color: '#f472b6', glow: '#f472b6', points: 1,  emoji: '🍎' },
    gold:    { color: '#fbbf24', glow: '#fbbf24', points: 3,  emoji: '⭐', life: 70 },
    diamond: { color: '#60a5fa', glow: '#60a5fa', points: 5,  emoji: '💎', life: 50 },
  };

  // Game state — kept in memory only (no persistence in sandbox).
  let snake, dir, nextDir, food, bonus, score, best = 0;
  let tickMs = 110;
  let lastTick = 0;
  let running = false, paused = false, gameOver = false;
  let rafId = null;
  let popAnim = 0;                  // food-eaten pulse timer

  function reset() {
    const mid = Math.floor(GRID / 2);
    snake = [
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid },
      { x: mid - 3, y: mid },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    gameOver = false;
    paused = false;
    bonus = null;
    placeFood();
    updateScore();
  }

  function freeCell() {
    let p;
    do {
      p = { x: rand(GRID), y: rand(GRID) };
    } while (
      snake.some(s => s.x === p.x && s.y === p.y) ||
      (food && food.x === p.x && food.y === p.y) ||
      (bonus && bonus.x === p.x && bonus.y === p.y)
    );
    return p;
  }

  function placeFood() {
    food = { ...freeCell(), type: 'apple' };
  }

  // Occasionally drop a timed bonus when the player eats regular food.
  function maybeSpawnBonus() {
    if (bonus) return;
    if (Math.random() < 0.28) {
      const type = Math.random() < 0.7 ? 'gold' : 'diamond';
      bonus = { ...freeCell(), type, ticks: FOODS[type].life };
    }
  }

  function rand(n) { return Math.floor(Math.random() * n); }

  function updateScore() {
    scoreEl.textContent = score;
    if (score > best) { best = score; }
    bestEl.textContent = best;
  }

  function start() {
    reset();
    running = true;
    overlay.classList.add('hidden');
    lastTick = performance.now();
    if (!rafId) loop(lastTick);
  }

  function endGame() {
    running = false;
    gameOver = true;
    ovTitle.textContent = 'Game Over';
    ovText.textContent = `You scored ${score} point${score === 1 ? '' : 's'}. ${score >= best && score > 0 ? "That's a new best! " : ''}Give it another go?`;
    startBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
  }

  function togglePause() {
    if (!running || gameOver) return;
    paused = !paused;
    if (paused) {
      ovTitle.textContent = 'Paused';
      ovText.textContent = 'Take a breath. Press Space or the button to resume.';
      startBtn.textContent = 'Resume';
      overlay.classList.remove('hidden');
    } else {
      overlay.classList.add('hidden');
      lastTick = performance.now();
    }
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall or self collision ends the run.
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame();
      return;
    }

    snake.unshift(head);

    // Age out the bonus food over time.
    if (bonus) {
      bonus.ticks--;
      if (bonus.ticks <= 0) bonus = null;
    }

    let ate = false;
    if (head.x === food.x && head.y === food.y) {
      score += FOODS.apple.points;
      popAnim = 1;
      ate = true;
      placeFood();
      maybeSpawnBonus();
    } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
      score += FOODS[bonus.type].points;
      popAnim = 1;
      ate = true;
      bonus = null;            // bonus eaten; snake grows but no new apple needed
    }

    if (ate) updateScore();
    else snake.pop();
  }

  function loop(now) {
    rafId = requestAnimationFrame(loop);
    if (running && !paused) {
      if (now - lastTick >= tickMs) {
        lastTick = now;
        step();
      }
    }
    if (popAnim > 0) popAnim = Math.max(0, popAnim - 0.08);
    draw();
  }

  function draw() {
    // Checkerboard background.
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        ctx.fillStyle = (x + y) % 2 === 0 ? '#131720' : '#10141c';
        ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
      }
    }

    // Regular food with a gentle pulse.
    drawFood(food.x, food.y, FOODS.apple);

    // Timed bonus food, if present.
    if (bonus) {
      const def = FOODS[bonus.type];
      drawFood(bonus.x, bonus.y, def);
      // Countdown ring that empties as time runs out; blinks near expiry.
      const frac = bonus.ticks / def.life;
      const blink = bonus.ticks > 12 || Math.floor(performance.now() / 150) % 2 === 0;
      if (blink) {
        const cx = bonus.x * CELL + CELL / 2;
        const cy = bonus.y * CELL + CELL / 2;
        ctx.strokeStyle = def.color;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(cx, cy, CELL * 0.46, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
        ctx.stroke();
      }
    }

    // Snake — head brightest, body fading toward the tail.
    for (let i = snake.length - 1; i >= 0; i--) {
      const seg = snake[i];
      const t = i / Math.max(1, snake.length - 1);
      const color = i === 0 ? '#86efac' : lerpColor('#4ade80', '#2c7a4d', t);
      drawCell(seg.x, seg.y, color, 0.86);
      if (i === 0) drawEyes(seg);
    }
  }

  function drawFood(gx, gy, def) {
    const pulse = 1 + Math.sin(performance.now() / 240) * 0.06 + popAnim * 0.35;
    // Soft glow halo.
    ctx.save();
    ctx.globalAlpha = 0.22;
    drawCell(gx, gy, def.glow, 0.95 * pulse, true);
    ctx.restore();
    // Core pellet.
    drawCell(gx, gy, def.color, 0.62 * pulse, true);
  }

  function drawCell(gx, gy, color, scale, round) {
    const size = CELL * scale;
    const off = (CELL - size) / 2;
    const x = gx * CELL + off;
    const y = gy * CELL + off;
    const r = round ? size / 2 : Math.min(6, size * 0.32);
    ctx.fillStyle = color;
    roundRect(x, y, size, size, r);
    ctx.fill();
  }

  function drawEyes(head) {
    const cx = head.x * CELL + CELL / 2;
    const cy = head.y * CELL + CELL / 2;
    const o = CELL * 0.18;
    const eye = CELL * 0.09;
    // Offset eyes in the direction of travel.
    const ex = dir.x * CELL * 0.12;
    const ey = dir.y * CELL * 0.12;
    ctx.fillStyle = '#0c1410';
    for (const s of [-1, 1]) {
      const px = cx + ex + (dir.x === 0 ? s * o : 0);
      const py = cy + ey + (dir.y === 0 ? s * o : 0);
      ctx.beginPath();
      ctx.arc(px, py, eye, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function lerpColor(a, b, t) {
    const ca = hexToRgb(a), cb = hexToRgb(b);
    const r = Math.round(ca.r + (cb.r - ca.r) * t);
    const g = Math.round(ca.g + (cb.g - ca.g) * t);
    const bl = Math.round(ca.b + (cb.b - ca.b) * t);
    return `rgb(${r},${g},${bl})`;
  }

  function hexToRgb(hex) {
    const n = parseInt(hex.slice(1), 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }

  // --- Input ---------------------------------------------------------------
  function setDir(x, y) {
    // Prevent reversing directly onto the neck.
    if (x === -dir.x && y === -dir.y) return;
    nextDir = { x, y };
  }

  const keyMap = {
    ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
    W: [0, -1], S: [0, 1], A: [-1, 0], D: [1, 0],
  };

  window.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      if (gameOver || !running) start();
      else togglePause();
      return;
    }
    const m = keyMap[e.key];
    if (m) {
      e.preventDefault();
      if (running && !paused) setDir(m[0], m[1]);
    }
  });

  startBtn.addEventListener('click', () => {
    if (paused && !gameOver) togglePause();
    else start();
  });

  // Speed selector.
  speedBox.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    tickMs = parseInt(btn.dataset.speed, 10);
    [...speedBox.children].forEach(c => c.classList.toggle('active', c === btn));
  });

  // Touch / swipe controls.
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener('touchmove', (e) => {
    if (!touchStart) return;
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
    touchStart = null;
    e.preventDefault();
  }, { passive: false });

  // Boot: render an idle frame behind the overlay.
  reset();
  draw();
})();
</script>
</body>
</html>
